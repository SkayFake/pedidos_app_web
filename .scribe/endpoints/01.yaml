name: Productos
description: |-

  Endpoints para consultar el catálogo de productos disponibles,
  con soporte para filtrado, búsqueda y paginación.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/products
    metadata:
      custom: []
      groupName: Productos
      groupDescription: |-

        Endpoints para consultar el catálogo de productos disponibles,
        con soporte para filtrado, búsqueda y paginación.
      subgroup: ''
      subgroupDescription: ''
      title: 'Listar productos'
      description: |-
        Retorna un listado paginado de productos disponibles.
        Soporta filtros por categoría, búsqueda por texto, y flags de recomendados/populares.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      category_id:
        custom: []
        name: category_id
        description: 'Filtrar por ID de categoría.'
        required: false
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      search:
        custom: []
        name: search
        description: 'Buscar por nombre o descripción.'
        required: false
        example: hamburguesa
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      recommended:
        custom: []
        name: recommended
        description: 'Mostrar solo productos recomendados.'
        required: false
        example: true
        type: boolean
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      popular:
        custom: []
        name: popular
        description: 'Mostrar solo productos populares.'
        required: false
        example: true
        type: boolean
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      per_page:
        custom: []
        name: per_page
        description: 'Cantidad de resultados por página (máx 50).'
        required: false
        example: 15
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
      category_id: 1
      search: hamburguesa
      recommended: true
      popular: true
      per_page: 15
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "data": [
              {
                "id": 1,
                "name": "Hamburguesa Clásica",
                "description": "Hamburguesa con carne de res, lechuga, tomate y queso",
                "base_price": "5.50",
                "base_price_fmt": "$5.50",
                "image": "http://pedidosapp.test/storage/products/hamburguesa.jpg",
                "is_available": true,
                "is_recommended": true,
                "is_popular": false,
                "category": {
                  "id": 1,
                  "name": "Hamburguesas"
                }
              }
            ],
            "links": { "first": "...", "last": "...", "prev": null, "next": "..." },
            "meta": { "current_page": 1, "last_page": 3, "per_page": 15, "total": 42 }
          }
        headers: []
        description: ''
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 3V5EgbkvZcDPa166h8fd4ae'
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - GET
    uri: 'api/v1/products/{product_id}'
    metadata:
      custom: []
      groupName: Productos
      groupDescription: |-

        Endpoints para consultar el catálogo de productos disponibles,
        con soporte para filtrado, búsqueda y paginación.
      subgroup: ''
      subgroupDescription: ''
      title: 'Detalle de producto'
      description: |-
        Retorna la información completa de un producto, incluyendo sus variantes
        y extras disponibles. Retorna 404 si el producto no está disponible.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      product_id:
        custom: []
        name: product_id
        description: 'The ID of the product.'
        required: true
        example: 17
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      product:
        custom: []
        name: product
        description: 'ID del producto.'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      product_id: 17
      product: 1
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "message": "Detalle del producto.",
            "data": {
              "id": 1,
              "name": "Hamburguesa Clásica",
              "description": "Hamburguesa con carne de res, lechuga, tomate y queso",
              "base_price": "5.50",
              "base_price_fmt": "$5.50",
              "image": "http://pedidosapp.test/storage/products/hamburguesa.jpg",
              "is_available": true,
              "is_recommended": true,
              "is_popular": false,
              "category": { "id": 1, "name": "Hamburguesas" },
              "variants": [
                {
                  "id": 1,
                  "name": "Tamaño Grande",
                  "price_modifier": "2.00",
                  "price_modifier_fmt": "+$2.00",
                  "is_default": false,
                  "is_available": true
                }
              ],
              "extras": [
                {
                  "id": 1,
                  "name": "Queso Extra",
                  "price": "0.75",
                  "price_fmt": "$0.75",
                  "is_available": true
                }
              ]
            }
          }
        headers: []
        description: ''
      -
        custom: []
        status: 404
        content: |-
          {
            "success": false,
            "message": "Este producto no está disponible actualmente."
          }
        headers: []
        description: ''
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 3V5EgbkvZcDPa166h8fd4ae'
    controller: null
    method: null
    route: null
