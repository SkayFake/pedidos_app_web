name: 'Autenticación Google'
description: |-

  Endpoints para inicio de sesión y registro utilizando el ID Token de Google.
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/auth/google-login
    metadata:
      custom: []
      groupName: 'Autenticación Google'
      groupDescription: |-

        Endpoints para inicio de sesión y registro utilizando el ID Token de Google.
      subgroup: ''
      subgroupDescription: ''
      title: 'Iniciar sesión o registrarse con Google'
      description: |-
        Valida un ID Token recibido desde Google.
        Si el usuario ya existe, inicia sesión inmediatamente.
        Si el usuario no existe, solicita el número de teléfono obligatorio.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      id_token:
        custom: []
        name: id_token
        description: 'ID Token de Google.'
        required: true
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      phone:
        custom: []
        name: phone
        description: 'optional Número de teléfono (obligatorio para el registro de nuevos usuarios).'
        required: false
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
    cleanBodyParameters:
      id_token: consequatur
      phone: consequatur
    fileParameters: []
    responses: []
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
