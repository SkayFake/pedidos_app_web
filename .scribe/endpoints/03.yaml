  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/orders
    metadata:
      custom: []
      groupName: Pedidos
      groupDescription: |-

        Endpoints para crear, consultar y cancelar pedidos del cliente autenticado.

        **Seguridad**: Al crear un pedido, el backend calcula todos los montos server-side.
        Los precios se leen directamente de la base de datos (products.base_price +
        product_variants.price_modifier + product_extras.price). El cliente solo envía
        IDs y cantidades.
      subgroup: ''
      subgroupDescription: ''
      title: 'Crear pedido'
      description: |-
        Crea un nuevo pedido con cálculo seguro del total server-side.

        **IMPORTANTE**: El backend JAMÁS confía en montos enviados por el cliente.
        Solo se aceptan IDs de productos, variantes, extras y sus cantidades.
        Los precios se calculan leyendo la base de datos.

        **Flujo del cálculo**:
        1. `products.base_price` → precio base
        2. `+ product_variants.price_modifier` → ajuste de variante
        3. `+ product_extras.price × cantidad` → extras
        4. Aplica promociones (1er pedido, #11, lealtad)
        5. Aplica cupón si es válido
        6. Delivery fee fijo: $2.00
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      branch_id:
        custom: []
        name: branch_id
        description: 'ID de la sucursal.'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      address_id:
        custom: []
        name: address_id
        description: 'ID de la dirección de entrega del cliente.'
        required: true
        example: 3
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      coupon_code:
        custom: []
        name: coupon_code
        description: 'Código de cupón a aplicar.'
        required: false
        example: BIENVENIDO10
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        deprecated: false
      use_loyalty_points:
        custom: []
        name: use_loyalty_points
        description: 'Usar puntos de lealtad para descuento.'
        required: false
        example: false
        type: boolean
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        deprecated: false
      notes:
        custom: []
        name: notes
        description: 'Instrucciones especiales (máx 500 caracteres).'
        required: false
        example: 'Sin cebolla por favor'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        deprecated: false
      items:
        custom: []
        name: items
        description: 'Lista de productos a pedir.'
        required: true
        example:
          - []
        type: 'object[]'
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      'items[].product_id':
        custom: []
        name: 'items[].product_id'
        description: 'ID del producto.'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'items[].variant_id':
        custom: []
        name: 'items[].variant_id'
        description: 'ID de la variante (opcional).'
        required: false
        example: 2
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        deprecated: false
      'items[].quantity':
        custom: []
        name: 'items[].quantity'
        description: 'Cantidad (1-20).'
        required: true
        example: 2
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'items[].extras':
        custom: []
        name: 'items[].extras'
        description: 'Extras para este ítem.'
        required: false
        example:
          - []
        type: 'object[]'
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
      'items[].extras[].extra_id':
