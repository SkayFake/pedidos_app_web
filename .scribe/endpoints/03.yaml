        description: 'Cantidad del extra (1-5).'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanBodyParameters:
      branch_id: 1
      address_id: 3
      coupon_code: BIENVENIDO10
      use_loyalty_points: false
      notes: 'Sin cebolla por favor'
      items:
        -
          product_id: 1
