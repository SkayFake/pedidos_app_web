    custom: []
    httpMethods:
      - GET
    uri: api/v1/orders
    metadata:
      custom: []
      groupName: Pedidos
      groupDescription: |-

        Endpoints para crear, consultar y cancelar pedidos del cliente autenticado.

        **Seguridad**: Al crear un pedido, el backend calcula todos los montos server-side.
        Los precios se leen directamente de la base de datos (products.base_price +
        product_variants.price_modifier + product_extras.price). El cliente solo envía
        IDs y cantidades.
      subgroup: ''
      subgroupDescription: ''
      title: 'Listar mis pedidos'
      description: |-
        Retorna los pedidos del cliente autenticado (activos + archivados),
        paginados y ordenados por más reciente.
        Opcionalmente se puede filtrar por estado.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      status:
        custom: []
        name: status
        description: 'Filtrar por estado del pedido. Valores: pending, confirmed, preparing, ready_to_go, assigned, on_way, delivered, cancelled.'
        required: false
        example: pending
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      per_page:
        custom: []
        name: per_page
        description: 'Cantidad por página (máx 50).'
        required: false
        example: 10
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
