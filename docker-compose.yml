version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:80"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=shop_db
      - DB_USERNAME=shop_user
      - DB_PASSWORD=shop_password
      - SESSION_DRIVER=file
      - APP_DEBUG=true
      - APP_ENV=production
      - APP_URL=https://publication-missed-introduce-communist.trycloudflare.com
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=shop_db
      - POSTGRES_USER=shop_user
      - POSTGRES_PASSWORD=shop_password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shop_db"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
