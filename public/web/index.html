<!DOCTYPE html>
<html>
<head>
  <base href="/web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PedidosApp - Aplicación móvil de pedidos de comida a domicilio.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PedidosApp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Google Maps JavaScript API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA5ZkDI6IJQZQwCk-gBd5FivF3R8UhgW4I"></script>

  <!-- Google Sign-In Client ID -->
  <meta name="google-signin-client_id" content="256020390313-sfud3k6e9f6dv7s9cot784u917c37i0l.apps.googleusercontent.com">

  <title>PedidosApp</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      font-family: 'Roboto', sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #ffffff;
      z-index: 9999;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-radius: 50%;
      border-top: 4px solid #89dad0;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      margin-top: 20px;
      color: #333333;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-indicator" class="loading-container">
    <div class="loader"></div>
    <div class="loading-text">Cargando PedidosApp...</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        loader.remove();
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
